# Server Configuration
server.port=8080

# Scraping Configuration (Apify)
# Provide these as environment variables or command-line args
apify.api-token=${APIFY_API_TOKEN:dummy-token-for-local-dev}
apify.actor-id=${APIFY_ACTOR_ID:dummy-actor-id}

# Database Configuration (Amazon Aurora Serverless v2 PostgreSQL -> H2 for local test)
spring.datasource.url=jdbc:h2:mem:planydb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration
# Generate schema natively during development, but validate only in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging (Optimize for AWS CloudWatch)
logging.level.org.springframework=INFO
logging.level.com.plany=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
